{{ partial "header.html" .}}

<script>
    window.onload = () => {
        currentURL = window.location.href;
        lowerCaseURL = currentURL.toLowerCase();
        if (currentURL != lowerCaseURL) {
            location.replace(lowerCaseURL);
        }
    };
</script>

<!-- Page Header -->
<header class="intro-header" >
    <div class="container">
    </div>
</header>

<!-- Main Content -->
<div class="container">
    <div class="row">
        <!-- Left Column -->
        <div class="col-md-6 text-center">
            <h1 style="font-size: 10rem; font-weight: bold;">404</h1>
        </div>
        <!-- Right Column -->
        <div class="col-md-6">
            <h2>Page Not Found</h2>
            <p>The page you are looking for does not exist. It might have been moved or deleted.</p>
            <p><a href="{{ .Site.BaseURL }}" class="btn btn-primary">Go Back to Home</a></p>
        </div>
    </div>
</div>

{{ partial "footer.html" .}}
